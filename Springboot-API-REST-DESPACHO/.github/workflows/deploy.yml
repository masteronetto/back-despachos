name: CI/CD back-despachos

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build y Push imagen
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest

      - name: Deploy en EC2 Backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest
            cd /home/ec2-user/back-despachos
            docker compose up -d --force-recreate